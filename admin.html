<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — LPK Fujisaki Gakuin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body class="admin-login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <span class="login-logo">🏯</span>
        <h1 class="login-title">Admin Panel</h1>
        <p class="login-subtitle">LPK Fujisaki Gakuin Center</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-icon-wrap">
            <span class="material-symbols-outlined">mail</span>
            <input type="email" id="email" placeholder="admin@fujisakigakuin.id" required />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <span class="material-symbols-outlined">lock</span>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
        </div>
        <div id="loginError" class="login-error" style="display:none;"></div>
        <button type="submit" class="btn-admin-primary" id="loginBtn">
          <span class="material-symbols-outlined">login</span>
          Masuk
        </button>
      </form>
      <a href="/" class="login-back">← Kembali ke Website</a>
    </div>
  </div>
  <script type="module" src="/js/admin-auth.js"></script>
</body>
</html>
